<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Diagnóstico</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, button { margin: 5px; padding: 10px; }
        .resultado { margin-top: 20px; }
    </style>
    <link rel="manifest" href="/static/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/service-worker.js');
        });
        }
    </script>
</head>
<body>
    <h1>Sistema de Diagnóstico por Sintomas</h1>

    <label>Digite os sintomas (separados por vírgula):</label><br>
    <input type="text" id="entrada_sintomas" placeholder="Ex: Febre, Tosse"><br>

    <button onclick="buscar()">Buscar Doenças</button>

    <div class="resultado" id="resultado"></div>

    <hr>

    <h2>Adicionar Nova Doença</h2>
    <input type="text" id="nova_doenca" placeholder="Nome da doença">
    <input type="text" id="novos_sintomas" placeholder="Sintomas (vírgula)">
    <button onclick="adicionar()">Adicionar</button>

    <script>
        function buscar() {
            const entrada = document.getElementById("entrada_sintomas").value;
            const sintomas = entrada.split(",").map(s => s.trim());

            fetch("/buscar", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({sintomas})
            })
            .then(response => response.json())
            .then(data => {
                let html = "<ul>";
                data.forEach(item => {
                    html += `<li>${item.doenca}: ${item.probabilidade}%</li>`;
                });
                html += "</ul>";
                document.getElementById("resultado").innerHTML = html;
            });
        }

        function adicionar() {
            const nome = document.getElementById("nova_doenca").value;
            const sintomas = document.getElementById("novos_sintomas").value.split(",").map(s => s.trim());

            fetch("/adicionar", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({nome, sintomas})
            })
            .then(() => alert("Doença adicionada com sucesso!"));
        }
    </script>
</body>
</html>
