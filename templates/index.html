<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MedSeeker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .tab {
            display: none;
        }
        .tab.active {
            display: block;
        }
        .tab-button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px 5px 0 0;
        }
        .tab-button.active {
            background: #0056b3;
        }
        .card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            background: #f9f9f9;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin: 3px;
        }
        button:hover {
            background: #0056b3;
        }
        input, textarea, select {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        /* Campo de sintomas maior */
        #novos_sintomas {
            width: 100%;
            height: 100px; /* Altura semelhante ao campo de texto do Qwen */
            resize: vertical; /* Permite redimensionar verticalmente */
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #f2f2f2;
        }
        .pagination {
            margin-top: 10px;
        }
        .pagination button {
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 MedSeeker</h1>

        <!-- Abas -->
        <div>
            <button class="tab-button active" onclick="openTab('busca')">Busca & Adição</button>
            <button class="tab-button" onclick="openTab('cadastradas')">Doenças Cadastradas</button>
        </div>

        <!-- Aba de Busca & Adição -->
        <div id="busca" class="tab active">
            <div class="card">
                <h2>🔍 Buscar Doenças</h2>
                <input type="text" id="entrada_sintomas" placeholder="Ex: Febre, Tosse" style="width: 70%;">
                <button onclick="buscar()">Buscar</button>
                <div id="resultado_busca" class="resultado"></div>
            </div>

            <div class="card">
                <h2>➕ Adicionar Nova Doença</h2>
                <input type="text" id="nova_doenca" placeholder="Nome da doença" style="width: 100%; margin-bottom: 10px;">
                <textarea id="novos_sintomas" placeholder="Sintomas (separados por vírgula)"></textarea>
                <button onclick="adicionar()">Adicionar</button>
            </div>
        </div>

        <!-- Aba de Doenças Cadastradas -->
        <div id="cadastradas" class="tab">
            <div class="card">
                <h2>📋 Doenças Cadastradas</h2>
                <button onclick="carregarDoencas(1)">Atualizar Lista</button>
                <button onclick="exportarDados()">Exportar Dados</button>
                <input type="file" id="arquivo_importar" accept=".json" onchange="importarDados()">

                <div id="lista_doencas"></div>
                <div id="paginacao" class="pagination"></div>
            </div>
        </div>
    </div>

    <script>
        let totalPaginas = 0;

        function openTab(tabName) {
            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }

            const buttons = document.getElementsByClassName("tab-button");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            document.getElementById(tabName).classList.add("active");
            event.currentTarget.classList.add("active");
        }

        function buscar() {
            const entrada = document.getElementById("entrada_sintomas").value;
            const sintomas = entrada.split(",").map(s => s.trim());

            fetch("/buscar", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({sintomas})
            })
            .then(response => response.json())
            .then(data => {
                let html = "<table><tr><th>Doença</th><th>Probabilidade</th></tr>";
                data.forEach(item => {
                    html += `<tr><td>${item.doenca}</td><td>${item.probabilidade}%</td></tr>`;
                });
                html += "</table>";
                document.getElementById("resultado_busca").innerHTML = html;
            });
        }

        function adicionar() {
            const nome = document.getElementById("nova_doenca").value;
            const sintomas = document.getElementById("novos_sintomas").value.split(",").map(s => s.trim());

            fetch("/adicionar", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({nome, sintomas})
            })
            .then(() => {
                alert("Doença adicionada com sucesso!");
                document.getElementById("nova_doenca").value = "";
                document.getElementById("novos_sintomas").value = "";
            });
        }

        function carregarDoencas(pagina = 1) {
            fetch(`/listar?page=${pagina}&limit=5`)
            .then(response => response.json())
            .then(data => {
                totalPaginas = data.total_paginas;
                let html = "<table><tr><th>Doença</th><th>Sintomas</th><th>Ações</th></tr>";
                data.doencas.forEach(item => {
                    html += `<tr>
                        <td>${item.nome}</td>
                        <td>${item.sintomas.join(", ")}</td>
                        <td>
                            <button onclick="editar('${item.nome}', ['${item.sintomas.join("','")}'])">Editar</button>
                            <button onclick="excluir('${item.nome}')">Excluir</button>
                        </td>
                    </tr>`;
                });
                html += "</table>";
                document.getElementById("lista_doencas").innerHTML = html;
                gerarPaginacao(pagina);
            });
        }

        function gerarPaginacao(paginaAtual) {
            let html = '';
            for (let i = 1; i <= totalPaginas; i++) {
                if (i === paginaAtual) {
                    html += `<button onclick="carregarDoencas(${i})" disabled>${i}</button>`;
                } else {
                    html += `<button onclick="carregarDoencas(${i})">${i}</button>`;
                }
            }
            document.getElementById("paginacao").innerHTML = html;
        }

        function editar(nome, sintomas) {
            const novos_sintomas = prompt("Edite os sintomas (separados por vírgula):", sintomas.join(", "));
            if (novos_sintomas) {
                fetch("/editar", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({nome, sintomas: novos_sintomas.split(",").map(s => s.trim())})
                })
                .then(() => {
                    alert("Doença editada com sucesso!");
                    carregarDoencas(); // Recarrega a página atual
                });
            }
        }

        function excluir(nome) {
            if (confirm(`Tem certeza que deseja excluir "${nome}"?`)) {
                fetch("/excluir", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({nome})
                })
                .then(() => {
                    alert("Doença excluída com sucesso!");
                    carregarDoencas(); // Recarrega a página atual
                });
            }
        }

        function exportarDados() {
            fetch("/exportar")
            .then(response => response.blob())
            .then(blob => {
                const url = window.URL.createObject const a = document.createElement("a");
                a.href = url;
                a.download = "banco_de_dados.json";
                a.click();
            });
        }

        function importarDados() {
            const input = document.getElementById("arquivo_importar");
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dados = JSON.parse(e.target.result);
                    fetch("/importar", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify(dados)
                    })
                    .then(() => {
                        alert("Dados importados com sucesso!");
                        carregarDoencas(1); // Recarrega a primeira página
                    });
                };
                reader.readAsText(file);
            }
        }
    </script>
</body>
</html>
